server.port=3000

# ── JWT ──────────────────────────────────────────────────────────────────────
# Secret en Base64 (mín 256 bits). Sobreescribe con variable de entorno JWT_SECRET en producción.
app.jwt.secret=${JWT_SECRET:YmFja2VuZC1idC1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tMjAyNi1sb2dpbg==}
# 8 horas en milisegundos
app.jwt.expiration-ms=28800000
logging.level.org.springframework.web.cors=DEBUG

# ── Supabase (PostgreSQL via PgBouncer Transaction Pooler) ──────────────────
spring.datasource.url=jdbc:postgresql://aws-0-us-west-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=${SUPABASE_USER:postgres.twhjbfcjzfumrxoxymyt}
spring.datasource.password=${SUPABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP – ajustado para PgBouncer transaction mode ────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.orm=WARN
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ───────────────────────────────────────────────────────────────────
# Session pooler (puerto 5432) soporta advisory locks que Flyway necesita
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://aws-0-us-west-2.pooler.supabase.com:5432/postgres?sslmode=require
spring.flyway.user=${SUPABASE_USER:postgres.twhjbfcjzfumrxoxymyt}
spring.flyway.password=${SUPABASE_PASSWORD}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.connect-retries=3

# ── Deshabilitar inicializacion por data.sql (Flyway gestiona el esquema) ───
spring.sql.init.mode=never

# ── Mail (Gmail SMTP) ────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:mauriciolopezasencio@gmail.com}
spring.mail.password=${MAIL_PASSWORD:ftds cuqf fgur xzts}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false
app.mail.destinatario=${MAIL_USERNAME:mauriciolopezasencio@gmail.com}

# ── Turnos ───────────────────────────────────────────────────────────────────
# Duración de cada turno en horas (DIA y NOCHE = 12 horas c/u)
app.turno.duracion-horas=12
