name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "EC2_HOST está VACÍO"; else echo "EC2_HOST OK"; fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "EC2_SSH_KEY está VACÍO"; else echo "EC2_SSH_KEY OK"; fi
          if [ -z "${{ secrets.SUPABASE_PASSWORD }}" ]; then echo "SUPABASE_PASSWORD está VACÍO"; else echo "SUPABASE_PASSWORD OK"; fi
          if [ -z "${{ secrets.JWT_SECRET }}" ]; then echo "JWT_SECRET está VACÍO"; else echo "JWT_SECRET OK"; fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          debug: true
          script: |
            cd ~/bitacora-back-end
            git pull
            docker stop bt-backend-container || true
            docker rm bt-backend-container || true
            docker build --no-cache -t bt-backend .
            docker run -d \
              --name bt-backend-container \
              --restart unless-stopped \
              -p 3000:3000 \
              -e SUPABASE_PASSWORD="${{ secrets.SUPABASE_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              bt-backend
