server.port=3000
logging.level.org.springframework.web.cors=DEBUG

# ── Supabase (PostgreSQL via PgBouncer Transaction Pooler) ──────────────────
spring.datasource.url=jdbc:postgresql://aws-0-us-west-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=${SUPABASE_USER:postgres.twhjbfcjzfumrxoxymyt}
spring.datasource.password=${SUPABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP – ajustado para PgBouncer transaction mode ────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ───────────────────────────────────────────────────────────────────
# Session pooler (puerto 5432) soporta advisory locks que Flyway necesita
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://aws-0-us-west-2.pooler.supabase.com:5432/postgres?sslmode=require
spring.flyway.user=${SUPABASE_USER:postgres.twhjbfcjzfumrxoxymyt}
spring.flyway.password=${SUPABASE_PASSWORD}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.connect-retries=3

# ── Deshabilitar inicializacion por data.sql (Flyway gestiona el esquema) ───
spring.sql.init.mode=never
